<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Ray favicon">
  <defs>
    <linearGradient id="ray" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0e8f0"/>
      <stop offset="45%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#c8a0f0"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.49 0 1 0 0 0.83 0 0 1 0 0.96 0 0 0 0.55 0"/>
    </filter>
  </defs>

  <text x="50%" y="52%" text-anchor="middle" dominant-baseline="middle"
        fill="#7dd3fc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="170" font-weight="800" letter-spacing="-12" filter="url(#softGlow)">
    Ray
  </text>
  <text x="50%" y="52%" text-anchor="middle" dominant-baseline="middle"
        fill="url(#ray)" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="170" font-weight="800" letter-spacing="-12">
    Ray
  </text>
  <path d="M170 346c36 18 78 28 86 28s50-10 86-28" fill="none" stroke="#7dd3fc" stroke-opacity="0.28" stroke-width="10" stroke-linecap="round"/>
</svg>
